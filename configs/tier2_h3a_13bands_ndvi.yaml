# Tầng 2 — T2-H3a: ablation NDVI riêng lẻ. CLAUDE.md mục 6.
# Chỉ thêm 1 index (NDVI) lên 13 bands → 14 channels. 1 seed (42) — ablation đơn.
tier: 2
exp_id: T2-H3a
config_desc: 13bands+NDVI
input_type: 13bands+ndvi

bands: all
indices: [NDVI]

seeds: [42]

model:
  name: resnet50
  pretrained: true

training:
  lr: 1.0e-4
  weight_decay: 1.0e-4
  batch_size: 32
  epochs: 50
  patience: 10
  label_smoothing: 0.1
  max_grad_norm: 1.0
  num_workers: 4

wandb:
  question: "NDVI một mình đóng góp bao nhiêu trên nền 13 bands?"
  hypothesis: "NDVI = (B08-B04)/(B08+B04) tách thực vật → cải thiện chủ yếu trên Annual Crop / Pasture / Herbaceous Vegetation."
  baseline_ref: "T1-R2 (13bands) seed42 — paired comparison."
  expected: "F1 nhóm vegetation (Annual/Pasture/Herb) tăng; F1 các lớp khác xấp xỉ; overall acc có thể không đổi."
