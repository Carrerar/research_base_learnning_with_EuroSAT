# Research RQ1-A — Condition B: ImageNet baseline, 5pct.
tier: 4
exp_id: RQ1-B-5
config_desc: imagenet-13bands-5pct
input_type: 13bands

bands: all
indices: []

seeds: [42, 123, 2024]

splits:
  train: train_5.txt
  val: val.txt
  test: test.txt
  label_fraction: 0.05
  subset_seed: 42
  subset_strategy: stratified_nested

model:
  name: resnet50
  pretrained: true

training:
  lr: 1.0e-4
  weight_decay: 1.0e-4
  batch_size: 32
  epochs: 50
  patience: 10
  label_smoothing: 0.1
  max_grad_norm: 1.0
  num_workers: 4

wandb:
  question: "ImageNet-pretrained 13-band ResNet-50 giữ được performance thế nào khi có 5% labels?"
  hypothesis: "ImageNet pretraining giúp hơn scratch nhưng vẫn còn khoảng trống cho domain-specific SSL."
  baseline_ref: "Winner Refine T1-R2 fixed; Research protocol freeze 80/10/10"
  expected: "low-label degradation; report mean±std over 3 seeds"
