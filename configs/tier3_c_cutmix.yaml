# Tầng 3 — T3-C variant: 13b raw + flip+rot + CutMix (alpha=1.0).
# Base = T1-R2 fixed (98.96% seed 42). Alpha=1.0 (Yun 2019 default cho image classification).
tier: 3
exp_id: T3-C-CutMix
config_desc: 13b-cutmix-fixedconv1
input_type: 13bands

bands: all
indices: []

seeds: [42]

model:
  name: resnet50
  pretrained: true

training:
  lr: 1.0e-4
  weight_decay: 1.0e-4
  batch_size: 32
  epochs: 50
  patience: 10
  label_smoothing: 0.1
  max_grad_norm: 1.0
  num_workers: 4

augmentation:
  spatial: null
  batch: cutmix
  batch_alpha: 1.0
  batch_p: 1.0

wandb:
  question: "CutMix alpha=1.0 có cải thiện trên T1-R2 fixed baseline 98.96% không?"
  hypothesis: "CutMix dán patch giữ local features tốt hơn MixUp cho satellite imagery (object có boundary rõ). Hard F1 vegetation có thể cải thiện."
  baseline_ref: "T1-R2 fixed seed 42 = 98.96% (Hard F1 98.69%, flip+rot only)."
  expected: "test/acc 98.5-99.4%; Hard F1 cải thiện 0-1.5pp."
