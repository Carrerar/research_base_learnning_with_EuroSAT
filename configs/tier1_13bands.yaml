# Tầng 1 — T1-R2: baseline all 13 bands (13 channels). CLAUDE.md mục 6.
tier: 1
exp_id: T1-R2
config_desc: 13bands
input_type: 13bands

bands: all          # -> tất cả 13 band theo thứ tự file
indices: []

seeds: [42, 123, 2024]

model:
  name: resnet50
  pretrained: true

training:
  lr: 1.0e-4
  weight_decay: 1.0e-4
  batch_size: 32
  epochs: 50
  patience: 10
  label_smoothing: 0.1
  max_grad_norm: 1.0
  num_workers: 4

wandb:
  question: "13 bands native có hơn RGB baseline không?"
  hypothesis: "Thêm NIR/SWIR/red-edge giúp ≥ RGB, đặc biệt trên lớp nông nghiệp."
  baseline_ref: "T1-R1 (RGB) + Helber 98.57%"
  expected: "test/acc ≥ RGB baseline; macro-F1 lớp khó cao hơn."
