# Tầng 1 — T1-R1: baseline RGB (3 channels). CLAUDE.md mục 6.
tier: 1
exp_id: T1-R1
config_desc: rgb
input_type: rgb

bands: rgb          # -> [B04, B03, B02]
indices: []         # không dùng spectral indices

seeds: [42, 123, 2024]

model:
  name: resnet50
  pretrained: true

training:
  lr: 1.0e-4
  weight_decay: 1.0e-4
  batch_size: 32
  epochs: 50
  patience: 10
  label_smoothing: 0.1
  max_grad_norm: 1.0
  num_workers: 4

# Notes cho W&B (template mục 7)
wandb:
  question: "RGB ResNet-50 reproduce được baseline 98.57% của paper không?"
  hypothesis: "RGB 3-channel với recipe cố định đạt 97.5-98.7% (acceptable range)."
  baseline_ref: "Helber et al. 2019 — RGB 98.57%"
  expected: "test/acc ~ 98.0-98.6%"
