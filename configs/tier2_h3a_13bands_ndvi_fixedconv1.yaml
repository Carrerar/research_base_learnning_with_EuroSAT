# Tầng 2 — T2-H3a (FIXED-CONV1 re-run): NDVI riêng lẻ trên 13 bands.
# Re-run với bug fix conv1 RGB-prior (2026-05-24). Paired với T1-R2 fixed seed 42.
tier: 2
exp_id: T2-H3a
config_desc: 13bands_NDVI-fixedconv1
input_type: 13bands+ndvi

bands: all
indices: [NDVI]

seeds: [42]

model:
  name: resnet50
  pretrained: true

training:
  lr: 1.0e-4
  weight_decay: 1.0e-4
  batch_size: 32
  epochs: 50
  patience: 10
  label_smoothing: 0.1
  max_grad_norm: 1.0
  num_workers: 4

wandb:
  question: "Sau conv1 fix, NDVI riêng lẻ còn cải thiện trên 13 bands không?"
  hypothesis: "Với B04/B03/B02 đã đúng prior, model học implicit NDVI từ B08-B04 → NDVI explicit có thể không còn marginal value."
  baseline_ref: "T1-R2 fixed seed42 = 98.96% — paired Δ."
  expected: "test/acc 98.7-99.2%; nếu Δ > +0.3pp thì NDVI vẫn có value sau fix."
