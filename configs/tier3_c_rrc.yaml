# Tầng 3 — T3-C variant: 13b raw + flip+rot + RandomResizedCrop.
# Base = T1-R2 fixed (98.96% seed 42). RRC scale [0.7, 1.0], ratio [3/4, 4/3], output 64×64.
tier: 3
exp_id: T3-C-RRC
config_desc: 13b-rrc-fixedconv1
input_type: 13bands

bands: all
indices: []

seeds: [42]

model:
  name: resnet50
  pretrained: true

training:
  lr: 1.0e-4
  weight_decay: 1.0e-4
  batch_size: 32
  epochs: 50
  patience: 10
  label_smoothing: 0.1
  max_grad_norm: 1.0
  num_workers: 4

augmentation:
  spatial: rrc
  batch: null

wandb:
  question: "RandomResizedCrop có cải thiện trên T1-R2 fixed baseline 98.96% không?"
  hypothesis: "RRC tăng diversity spatial context → giảm overfitting, có thể cải thiện Hard F1 cho vegetation classes (vốn nhạy với scale/context)."
  baseline_ref: "T1-R2 fixed seed 42 = 98.96% (Hard F1 98.69%, flip+rot only)."
  expected: "test/acc 98.5-99.3%; Hard F1 cải thiện 0-1pp."
