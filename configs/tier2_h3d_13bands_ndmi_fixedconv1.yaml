# Tầng 2 — T2-H3d (FIXED-CONV1 re-run): NDMI riêng lẻ trên 13 bands.
tier: 2
exp_id: T2-H3d
config_desc: 13bands_NDMI-fixedconv1
input_type: 13bands+ndmi

bands: all
indices: [NDMI]

seeds: [42]

model:
  name: resnet50
  pretrained: true

training:
  lr: 1.0e-4
  weight_decay: 1.0e-4
  batch_size: 32
  epochs: 50
  patience: 10
  label_smoothing: 0.1
  max_grad_norm: 1.0
  num_workers: 4

wandb:
  question: "Sau conv1 fix, NDMI riêng lẻ còn cải thiện trên 13 bands không?"
  hypothesis: "NDMI = (B08-B11)/(B08+B11) là −NDBI về toán; nhắm độ ẩm Forest/Herb. Sau fix, NDMI có thể redundant tương tự NDBI."
  baseline_ref: "T1-R2 fixed seed42 = 98.96% — paired Δ."
  expected: "test/acc 98.7-99.2%; cải thiện chủ yếu trên Forest/Herb nếu có."
