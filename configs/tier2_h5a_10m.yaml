# Tầng 2 — T2-H5a: chỉ dùng 4 band 10m (B02, B03, B04, B08). CLAUDE.md mục 6.
# Câu hỏi: bands resolution cao có đủ thông tin? So với T1-R2 (13bands).
tier: 2
exp_id: T2-H5a
config_desc: 10m
input_type: 10m-only

bands: 10m                              # B02, B03, B04, B08 (Blue, Green, Red, NIR)
indices: []

seeds: [42]

model:
  name: resnet50
  pretrained: true

training:
  lr: 1.0e-4
  weight_decay: 1.0e-4
  batch_size: 32
  epochs: 50
  patience: 10
  label_smoothing: 0.1
  max_grad_norm: 1.0
  num_workers: 4

wandb:
  question: "Chỉ 4 band 10m (RGB + NIR) có đủ không, hay 9 band còn lại (20m/60m) là noise?"
  hypothesis: "B08 (NIR) là kênh quan trọng nhất ngoài RGB; nếu 10m đạt gần T1-R2 thì 9 band khác đóng góp ít."
  baseline_ref: "T1-R2 (13bands) seed42 và T1-R1 (RGB) seed42 — paired."
  expected: "10m ≈ T1-R2 (chênh trong nhiễu). Nếu thấp hơn rõ → bands 20m/60m có thông tin thật."
