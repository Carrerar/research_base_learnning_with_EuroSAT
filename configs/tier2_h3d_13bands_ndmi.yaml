# Tầng 2 — T2-H3d: ablation NDMI riêng lẻ. CLAUDE.md mục 6.
tier: 2
exp_id: T2-H3d
config_desc: 13bands+NDMI
input_type: 13bands+ndmi

bands: all
indices: [NDMI]

seeds: [42]

model:
  name: resnet50
  pretrained: true

training:
  lr: 1.0e-4
  weight_decay: 1.0e-4
  batch_size: 32
  epochs: 50
  patience: 10
  label_smoothing: 0.1
  max_grad_norm: 1.0
  num_workers: 4

wandb:
  question: "NDMI một mình đóng góp bao nhiêu trên nền 13 bands?"
  hypothesis: "NDMI = (B08-B11)/(B08+B11) đo moisture trong thực vật → cải thiện trên Forest / Herbaceous Vegetation (vốn dễ nhầm Annual Crop)."
  baseline_ref: "T1-R2 (13bands) seed42 — paired."
  expected: "F1 Forest / HerbaceousVegetation tăng; có thể giảm nhầm lẫn Herbaceous vs Annual Crop."
