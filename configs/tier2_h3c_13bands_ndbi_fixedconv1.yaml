# T2-H3c với conv1 RGB-prior bug FIX (2026-05-24, bare-minimum re-run).
# Khác tier2_h3c_13bands_ndbi.yaml: config_desc đổi để W&B run name phân biệt
# với 4 seed buggy đã chạy. Không dùng `+` trong config_desc để tránh
# wandb.Artifact() reject (đã sanitize sau commit nhưng giữ cẩn thận).
tier: 2
exp_id: T2-H3c
config_desc: 13bands_NDBI-fixedconv1
input_type: 13bands+ndbi

bands: all
indices: [NDBI]

seeds: [42, 123, 2024, 7]

model:
  name: resnet50
  pretrained: true

training:
  lr: 1.0e-4
  weight_decay: 1.0e-4
  batch_size: 32
  epochs: 50
  patience: 10
  label_smoothing: 0.1
  max_grad_norm: 1.0
  num_workers: 4

wandb:
  question: "Sau fix conv1 RGB-prior, T2-H3c (13b+NDBI) đạt bao nhiêu? Có vượt T1-R2 fixed và must-have Hard F1 +1.5pp?"
  hypothesis: "H3c fixed ≥ 99.4% acc, Hard F1 ≥ 98.5% (so với buggy 98.88% / 97.86%). Δ tương tự T1-R2 (+0.55%) nhân lên cho NDBI cũng được hưởng prior đúng."
  baseline_ref: "T2-H3c buggy 4-seed: 98.88% ± 0.18% / Hard F1 97.86% ± 0.24pp; T1-R2 fixed seed42 = 98.96%."
  expected: "test/acc ≥ 99.2%; Hard F1 ≥ 98.0%; Gap Hard-Easy < 1.2pp."
