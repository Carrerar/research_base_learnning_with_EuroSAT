# Tầng 2 — T2-H2 (FIXED-CONV1 re-run): câu hỏi trung tâm của Refine.
# Re-run với bug fix conv1 RGB-prior (2026-05-24). Phải so paired với:
#   - T1-R2 fixed (3 seeds 98.85% mean) để xem indices có giúp 13b alone.
#   - T2-H2 buggy cũ (98.48% mean) để xem fix có tác động trên 17-channel input.
tier: 2
exp_id: T2-H2
config_desc: 13bands_indices-fixedconv1
input_type: 13bands+indices

bands: all
indices: [NDVI, NDWI, NDBI, NDMI]

seeds: [42, 123, 2024]

model:
  name: resnet50
  pretrained: true

training:
  lr: 1.0e-4
  weight_decay: 1.0e-4
  batch_size: 32
  epochs: 50
  patience: 10
  label_smoothing: 0.1
  max_grad_norm: 1.0
  num_workers: 4

wandb:
  question: "Với conv1 RGB-prior fix, 13 bands + 4 indices có hơn 13 bands alone (T1-R2 fixed)?"
  hypothesis: "Indices ép domain knowledge vào input. Sau fix, B04 đã có Red prior nên model có thể tự học implicit NDVI. Câu hỏi: indices explicit có còn marginal value không?"
  baseline_ref: "T1-R2 fixed 98.85% (3 seeds) và T2-H2 buggy 98.48% (3 seeds) — paired cùng seed."
  expected: "test/acc 98.7-99.1% (khớp T1-R2 fixed); macro-F1 hard mean ≥ 0.985 (4 lớp khó)."
