# Tầng 2 — T2-H5c: 10m + atmospheric (60m: B01, B09, B10). CLAUDE.md mục 6.
# 4 + 3 = 7 channels. Câu hỏi đối chứng với H5b: nếu H5a + atmospheric ≈ H5a thì
# atmospheric đúng là noise.
tier: 2
exp_id: T2-H5c
config_desc: 10m+atm
input_type: 10m+atmospheric

bands: [10m, atmospheric]               # B02,B03,B04,B08 + B01,B09,B10
indices: []

seeds: [42]

model:
  name: resnet50
  pretrained: true

training:
  lr: 1.0e-4
  weight_decay: 1.0e-4
  batch_size: 32
  epochs: 50
  patience: 10
  label_smoothing: 0.1
  max_grad_norm: 1.0
  num_workers: 4

wandb:
  question: "Atmospheric bands (B01 aerosol, B09 water vapor, B10 cirrus) là noise hay tín hiệu?"
  hypothesis: "Atmospheric bands phục vụ hiệu chỉnh khí quyển — sau khi ảnh đã được hiệu chỉnh, chúng gần như không mang thông tin LULC. Kỳ vọng H5c ≈ H5a, có thể thấp hơn do dilution channels."
  baseline_ref: "T2-H5a (10m-only) seed42 — paired để cô lập đóng góp atmospheric."
  expected: "H5c ≈ H5a hoặc thấp hơn nhẹ. Nếu H5c < H5a có ý nghĩa → atmospheric đúng là noise, nên loại khi build mô hình production."
