# Tầng 2 — T2-H3b: ablation NDWI riêng lẻ. CLAUDE.md mục 6.
tier: 2
exp_id: T2-H3b
config_desc: 13bands+NDWI
input_type: 13bands+ndwi

bands: all
indices: [NDWI]

seeds: [42]

model:
  name: resnet50
  pretrained: true

training:
  lr: 1.0e-4
  weight_decay: 1.0e-4
  batch_size: 32
  epochs: 50
  patience: 10
  label_smoothing: 0.1
  max_grad_norm: 1.0
  num_workers: 4

wandb:
  question: "NDWI một mình đóng góp bao nhiêu trên nền 13 bands?"
  hypothesis: "NDWI = (B03-B08)/(B03+B08) tách nước → cải thiện chủ yếu trên River / SeaLake."
  baseline_ref: "T1-R2 (13bands) seed42 — paired."
  expected: "F1 River / SeaLake tăng (vốn đã cao ~0.99, ít dư địa); overall acc gần như không đổi."
