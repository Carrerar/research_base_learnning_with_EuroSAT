# Tầng 2 — T2-H2: câu hỏi trung tâm của Refine. CLAUDE.md mục 6.
# 13 bands + 4 spectral indices → 17 channels. Chạy đủ 3 seed (như Tầng 1) để
# so paired với cả T1-R1 (RGB) và T1-R2 (13bands).
tier: 2
exp_id: T2-H2
config_desc: 13bands+indices
input_type: 13bands+indices

bands: all                              # 13 band Sentinel-2
indices: [NDVI, NDWI, NDBI, NDMI]       # 4 spectral indices on-the-fly

seeds: [42, 123, 2024]

model:
  name: resnet50
  pretrained: true

training:
  lr: 1.0e-4
  weight_decay: 1.0e-4
  batch_size: 32
  epochs: 50
  patience: 10
  label_smoothing: 0.1
  max_grad_norm: 1.0
  num_workers: 4

wandb:
  question: "13 bands + 4 spectral indices có hơn 13 bands thô (T1-R2)?"
  hypothesis: "Indices ép kiến thức domain (vegetation/water/built-up/moisture) vào input, giảm gánh nặng cho mạng → macro-F1 4 lớp khó tăng ≥1.5%, overall acc ≥ baseline."
  baseline_ref: "T1-R1 (RGB) 98.52% và T1-R2 (13bands) 98.48% — paired cùng 3 seed."
  expected: "test/acc ≥ 98.5%; macro-F1 hard mean (PermanentCrop/HerbVeg/AnnualCrop/Pasture) ≥ 0.985 (baseline 0.9707)."
