# Tầng 2 — T2-H3b (FIXED-CONV1 re-run): NDWI riêng lẻ trên 13 bands.
tier: 2
exp_id: T2-H3b
config_desc: 13bands_NDWI-fixedconv1
input_type: 13bands+ndwi

bands: all
indices: [NDWI]

seeds: [42]

model:
  name: resnet50
  pretrained: true

training:
  lr: 1.0e-4
  weight_decay: 1.0e-4
  batch_size: 32
  epochs: 50
  patience: 10
  label_smoothing: 0.1
  max_grad_norm: 1.0
  num_workers: 4

wandb:
  question: "Sau conv1 fix, NDWI riêng lẻ còn cải thiện trên 13 bands không?"
  hypothesis: "NDWI = (B03-B08)/(B03+B08) tách nước. Sau fix, B03 Green + B08 NIR đều có prior tốt → NDWI explicit có thể redundant."
  baseline_ref: "T1-R2 fixed seed42 = 98.96% — paired Δ."
  expected: "test/acc 98.7-99.2%; cải thiện chủ yếu trên SeaLake/River nếu có."
