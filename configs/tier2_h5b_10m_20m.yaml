# Tầng 2 — T2-H5b: 10m + 20m bands (bỏ atmospheric 60m). CLAUDE.md mục 6.
# 4 + 6 = 10 channels. Câu hỏi: 20m bands (red-edge, SWIR, B8A) đóng góp gì?
tier: 2
exp_id: T2-H5b
config_desc: 10m+20m
input_type: 10m+20m

bands: [10m, 20m]                       # B02,B03,B04,B08 + B05,B06,B07,B8A,B11,B12
indices: []

seeds: [42]

model:
  name: resnet50
  pretrained: true

training:
  lr: 1.0e-4
  weight_decay: 1.0e-4
  batch_size: 32
  epochs: 50
  patience: 10
  label_smoothing: 0.1
  max_grad_norm: 1.0
  num_workers: 4

wandb:
  question: "Thêm 6 band 20m (red-edge B05-B07, B8A, SWIR B11/B12) lên 10m có giúp gì?"
  hypothesis: "Red-edge nhạy với chlorophyll, SWIR nhạy với moisture — kỳ vọng cải thiện lớp vegetation. So với H5a để đo riêng 20m, so với T1-R2 để xác nhận bỏ atmospheric không thiệt."
  baseline_ref: "T2-H5a (10m-only) seed42 và T1-R2 (13bands) seed42."
  expected: "H5b > H5a (20m bands đem thông tin) và H5b ≈ T1-R2 (atmospheric không quan trọng) — nếu cả hai đúng → confirm H5c (atmospheric là noise)."
