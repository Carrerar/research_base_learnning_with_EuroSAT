# Tầng 3 — T3-A LR sweep: lr 1e-3 (10× baseline 1e-4).
tier: 3
exp_id: T3-A-lr1e-3
config_desc: 13b-lr1e-3-fixedconv1
input_type: 13bands

bands: all
indices: []
seeds: [42]

model:
  name: resnet50
  pretrained: true

training:
  optimizer: adamw
  lr: 1.0e-3
  weight_decay: 1.0e-4
  batch_size: 32
  epochs: 50
  patience: 10
  label_smoothing: 0.1
  max_grad_norm: 1.0
  num_workers: 4

wandb:
  question: "LR rất cao (1e-3) có khả thi cho fine-tune pretrained encoder?"
  hypothesis: "1e-3 thường quá cao cho fine-tune; dự kiến diverge hoặc kém hơn baseline đáng kể."
  baseline_ref: "T1-R2 fixed seed 42 = 98.96% (lr=1e-4)."
  expected: "test/acc 97.5-98.5%; nếu < 98% confirm 1e-3 quá cao cho fine-tune."
